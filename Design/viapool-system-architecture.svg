<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">ViaPool System Architecture</title>
  <desc id="desc">Architecture diagram showing ViaPool frontend clients, Express backend services, MongoDB data layer, Socket.IO realtime channel, and third-party integrations.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6efe5" />
      <stop offset="50%" stop-color="#fbf8f2" />
      <stop offset="100%" stop-color="#e7f0ee" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.94" />
      <stop offset="100%" stop-color="#f5f7f6" stop-opacity="0.98" />
    </linearGradient>
    <linearGradient id="accentWarm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb55c" />
      <stop offset="100%" stop-color="#f07f3c" />
    </linearGradient>
    <linearGradient id="accentCool" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8f83" />
      <stop offset="100%" stop-color="#275d6e" />
    </linearGradient>
    <linearGradient id="accentSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9d9b5" />
      <stop offset="100%" stop-color="#ebf1ef" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#13292f" flood-opacity="0.12" />
    </filter>
    <marker id="arrowDark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#355a63" />
    </marker>
    <marker id="arrowWarm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e67d3f" />
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #17333b; }
      .subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #44646c; }
      .panel-title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #17333b; }
      .panel-subtitle { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #58727a; letter-spacing: 1px; text-transform: uppercase; }
      .card-title { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #17333b; }
      .card-text { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #4a6066; }
      .mini { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #4f666d; }
      .note { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #6d7f84; }
      .chip { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #fffdf8; letter-spacing: 0.5px; }
      .muted-chip { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #355a63; letter-spacing: 0.4px; }
      .label { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #355a63; }
      .white { fill: #ffffff; }
      .stroke-dark { stroke: #21444c; stroke-width: 2; }
      .stroke-soft { stroke: #d4dfdc; stroke-width: 1.5; }
      .stroke-dashed { stroke: #88a6a0; stroke-width: 2; stroke-dasharray: 7 6; }
      .flow-dark { fill: none; stroke: #355a63; stroke-width: 3; marker-end: url(#arrowDark); }
      .flow-warm { fill: none; stroke: #e67d3f; stroke-width: 3; marker-end: url(#arrowWarm); }
      .flow-bidir { fill: none; stroke: #355a63; stroke-width: 3; marker-start: url(#arrowDark); marker-end: url(#arrowDark); }
      .flow-dashed { fill: none; stroke: #7b9892; stroke-width: 2.5; stroke-dasharray: 8 7; marker-end: url(#arrowDark); }
    </style>
  </defs>

  <rect width="1600" height="1120" fill="url(#bg)" />
  <circle cx="1430" cy="120" r="180" fill="#f3c98e" opacity="0.18" />
  <circle cx="121" cy="970" r="220" fill="#8db4aa" opacity="0.14" />
  <circle cx="780" cy="570" r="410" fill="#ffffff" opacity="0.26" />

  <text x="72" y="76" class="title">ViaPool System Architecture</text>
  <text x="72" y="108" class="subtitle">React PWA frontend, Express + Socket.IO backend, MongoDB core data store, and mobility-focused integrations</text>

  <rect x="52" y="142" rx="28" ry="28" width="380" height="838" fill="url(#panel)" filter="url(#shadow)" />
  <rect x="470" y="142" rx="28" ry="28" width="646" height="838" fill="url(#panel)" filter="url(#shadow)" />
  <rect x="1150" y="142" rx="28" ry="28" width="398" height="838" fill="url(#panel)" filter="url(#shadow)" />

  <text x="84" y="188" class="panel-subtitle">Clients</text>
  <text x="84" y="218" class="panel-title">User Interfaces</text>

  <text x="502" y="188" class="panel-subtitle">Application Core</text>
  <text x="502" y="218" class="panel-title">Backend Services</text>

  <text x="1182" y="188" class="panel-subtitle">Persistence + Integrations</text>
  <text x="1182" y="218" class="panel-title">Data Stores And External Services</text>

  <rect x="84" y="258" rx="22" ry="22" width="316" height="134" fill="url(#accentWarm)" filter="url(#shadow)" />
  <text x="112" y="302" class="chip">WEB CLIENT</text>
  <text x="112" y="334" class="white" style="font: 700 24px 'Segoe UI', Arial, sans-serif;">React + Vite SPA</text>
  <text x="112" y="362" class="white" style="font: 500 14px 'Segoe UI', Arial, sans-serif;">Lazy-loaded routes for rider, driver, auth,</text>
  <text x="112" y="382" class="white" style="font: 500 14px 'Segoe UI', Arial, sans-serif;">bookings, payments, chat, reviews, tracking</text>

  <rect x="84" y="424" rx="20" ry="20" width="316" height="108" fill="#fff9f1" class="stroke-soft" />
  <text x="110" y="462" class="card-title">Progressive Web App Layer</text>
  <text x="110" y="488" class="card-text">`registerSW.js` enables service worker registration</text>
  <text x="110" y="510" class="card-text">Offline notice and installable mobile-friendly shell</text>

  <rect x="84" y="560" rx="20" ry="20" width="150" height="130" fill="#eef5f3" class="stroke-soft" />
  <text x="108" y="595" class="card-title">Passenger</text>
  <text x="108" y="621" class="card-text">Search rides</text>
  <text x="108" y="643" class="card-text">Book + pay</text>
  <text x="108" y="665" class="card-text">Track + review</text>

  <rect x="250" y="560" rx="20" ry="20" width="150" height="130" fill="#fff5ea" class="stroke-soft" />
  <text x="278" y="595" class="card-title">Driver</text>
  <text x="278" y="621" class="card-text">Onboarding</text>
  <text x="278" y="643" class="card-text">Post rides</text>
  <text x="278" y="665" class="card-text">Manage earnings</text>

  <rect x="84" y="720" rx="20" ry="20" width="316" height="138" fill="#f8fbfa" class="stroke-soft" />
  <text x="110" y="758" class="card-title">Frontend Communication</text>
  <text x="110" y="784" class="card-text">REST API via `src/lib/api.js` with bearer token support</text>
  <text x="110" y="806" class="card-text">Realtime updates through Socket.IO auth handshake</text>
  <text x="110" y="828" class="card-text">Leaflet map views for ride routes and live location</text>

  <rect x="84" y="886" rx="20" ry="20" width="316" height="64" fill="#17333b" opacity="0.95" />
  <text x="112" y="925" class="chip">Browser / Mobile Web Users</text>

  <rect x="502" y="258" rx="24" ry="24" width="582" height="120" fill="url(#accentCool)" filter="url(#shadow)" />
  <text x="532" y="302" class="chip">ENTRYPOINT</text>
  <text x="532" y="334" class="white" style="font: 700 26px 'Segoe UI', Arial, sans-serif;">Node.js + Express API Server</text>
  <text x="532" y="362" class="white" style="font: 500 14px 'Segoe UI', Arial, sans-serif;">`src/index.js` boots HTTP server, connects MongoDB, mounts Socket.IO, and exposes `/health`</text>

  <rect x="516" y="414" rx="18" ry="18" width="260" height="148" fill="#f9fcfb" class="stroke-soft" />
  <text x="540" y="448" class="card-title">Auth + User Domain</text>
  <text x="540" y="474" class="card-text">JWT access/refresh token flow</text>
  <text x="540" y="496" class="card-text">Profile, public user pages, settings</text>
  <text x="540" y="518" class="card-text">Role-aware access for driver/passenger journeys</text>
  <text x="540" y="544" class="mini">Routes: `/auth`, `/users`</text>

  <rect x="798" y="414" rx="18" ry="18" width="272" height="148" fill="#fffaf3" class="stroke-soft" />
  <text x="822" y="448" class="card-title">Ride + Booking Domain</text>
  <text x="822" y="474" class="card-text">Ride posting, discovery, seat reservation</text>
  <text x="822" y="496" class="card-text">Booking lifecycle and status management</text>
  <text x="822" y="518" class="card-text">Driver ride operations and passenger booking views</text>
  <text x="822" y="544" class="mini">Routes: `/rides`, `/bookings`, `/vehicles`, `/driver`</text>

  <rect x="516" y="592" rx="18" ry="18" width="260" height="160" fill="#f6fbf8" class="stroke-soft" />
  <text x="540" y="626" class="card-title">Payments + Earnings</text>
  <text x="540" y="652" class="card-text">Razorpay order creation and signature verification</text>
  <text x="540" y="674" class="card-text">Payment records tied to booking state</text>
  <text x="540" y="696" class="card-text">Driver earnings endpoints for revenue visibility</text>
  <text x="540" y="722" class="mini">Routes: `/payments`, `/earnings`</text>

  <rect x="798" y="592" rx="18" ry="18" width="272" height="160" fill="#fdf7f0" class="stroke-soft" />
  <text x="822" y="626" class="card-title">Messaging + Notifications + Safety</text>
  <text x="822" y="652" class="card-text">Ride-scoped chat and typing indicators</text>
  <text x="822" y="674" class="card-text">Notification persistence and delivery fan-out</text>
  <text x="822" y="696" class="card-text">SOS and review endpoints for trust + safety</text>
  <text x="822" y="722" class="mini">Routes: `/messages`, `/notifications`, `/reviews`, `/sos`</text>

  <rect x="516" y="782" rx="18" ry="18" width="554" height="150" fill="url(#accentSoft)" class="stroke-soft" />
  <text x="540" y="818" class="card-title">Realtime Layer: Socket.IO</text>
  <text x="540" y="844" class="card-text">Authenticated websocket channel for personal rooms, ride rooms, presence, chat delivery, typing events,</text>
  <text x="540" y="866" class="card-text">driver location updates, and passenger live-position sharing during active trips</text>
  <text x="540" y="894" class="mini">Connected user tracking is maintained in-memory on the backend process</text>

  <rect x="1182" y="258" rx="20" ry="20" width="334" height="118" fill="#f8fbfa" class="stroke-soft" />
  <text x="1208" y="294" class="card-title">MongoDB Atlas</text>
  <text x="1208" y="320" class="card-text">Primary operational data store via Mongoose</text>
  <text x="1208" y="342" class="card-text">Users, rides, bookings, vehicles, messages,</text>
  <text x="1208" y="364" class="card-text">notifications, payments, reviews, SOS</text>

  <rect x="1182" y="402" rx="20" ry="20" width="334" height="118" fill="#fff7ee" class="stroke-soft" />
  <text x="1208" y="438" class="card-title">Razorpay</text>
  <text x="1208" y="464" class="card-text">Online payment order creation</text>
  <text x="1208" y="486" class="card-text">Signature verification before booking payment is marked paid</text>

  <rect x="1182" y="546" rx="20" ry="20" width="334" height="118" fill="#eff6f3" class="stroke-soft" />
  <text x="1208" y="582" class="card-title">AWS S3</text>
  <text x="1208" y="608" class="card-text">Multer + S3 storage for profile photos and driver documents</text>
  <text x="1208" y="630" class="card-text">Upload flow is routed through backend services</text>

  <rect x="1182" y="690" rx="20" ry="20" width="334" height="118" fill="#fffaf3" class="stroke-soft" />
  <text x="1208" y="726" class="card-title">Email SMTP</text>
  <text x="1208" y="752" class="card-text">Nodemailer integration for transactional email delivery</text>
  <text x="1208" y="774" class="card-text">Used for account-related notification workflows</text>

  <rect x="1182" y="834" rx="20" ry="20" width="334" height="118" fill="#f5fbf9" class="stroke-soft" />
  <text x="1208" y="870" class="card-title">Map + Routing APIs</text>
  <text x="1208" y="896" class="card-text">Nominatim (OpenStreetMap) for autocomplete/geocoding</text>
  <text x="1208" y="918" class="card-text">OSRM for route distance, duration, and geometry</text>

  <rect x="1204" y="984" rx="14" ry="14" width="132" height="46" fill="#ffffff" opacity="0.92" class="stroke-dashed" />
  <text x="1228" y="1012" class="muted-chip">REDIS URL</text>
  <text x="1206" y="1050" class="note">Configured in environment, but not actively wired in current source flow</text>

  <path d="M 400 324 C 448 324, 468 324, 502 324" class="flow-dark" />
  <text x="430" y="306" class="label">HTTPS / REST</text>

  <path d="M 400 796 C 450 796, 452 856, 516 856" class="flow-warm" />
  <text x="428" y="776" class="label">Socket.IO events</text>

  <path d="M 1084 324 C 1126 324, 1138 324, 1182 324" class="flow-dark" />
  <text x="1102" y="306" class="label">Mongoose</text>

  <path d="M 1070 666 C 1136 666, 1128 462, 1182 462" class="flow-dark" />
  <text x="1088" y="514" class="label">Payment API</text>

  <path d="M 1038 676 C 1116 676, 1128 606, 1182 606" class="flow-dark" />
  <text x="1090" y="620" class="label">File uploads</text>

  <path d="M 1070 696 C 1132 696, 1124 750, 1182 750" class="flow-dark" />
  <text x="1090" y="736" class="label">Email send</text>

  <path d="M 1070 520 C 1134 520, 1120 894, 1182 894" class="flow-dark" />
  <text x="1094" y="874" class="label">Geocoding + routing</text>

  <path d="M 1084 856 C 1130 856, 1144 324, 1182 324" class="flow-dashed" />
  <text x="1102" y="834" class="label">Message + presence persistence</text>

  <path d="M 240 690 C 240 742, 240 742, 240 720" fill="none" stroke="#d5b18f" stroke-width="2" />
  <path d="M 316 690 C 316 742, 316 742, 316 720" fill="none" stroke="#9ab7af" stroke-width="2" />

  <rect x="78" y="1016" rx="16" ry="16" width="1038" height="62" fill="#17333b" opacity="0.94" />
  <text x="106" y="1052" class="chip">Deployment view: Render hosts the Node backend (`render.yaml`), while the React app calls the API using `VITE_API_URL` and uses the same auth tokens for REST and Socket.IO.</text>

  <rect x="1150" y="1016" rx="16" ry="16" width="398" height="62" fill="#ffffff" opacity="0.9" class="stroke-soft" />
  <text x="1178" y="1052" class="note">Diagram generated from current repo structure on 2026-04-03</text>
</svg>
